  const h = Math.floor(Math.random() * 360);

  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r=0, g=0, b=0;
  if      (h < 60)  { r=c; g=x; b=0; }
  else if (h < 120) { r=x; g=c; b=0; }
  else if (h < 180) { r=0; g=c; b=x; }

  else if (h < 300) { r=x; g=0; b=c; }

  const hex = n => Math.round((n + m) * 255).toString(16).padStart(2, '0');
  return '#' + hex(r) + hex(g) + hex(b);

// Seeded PRNG
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

// Smooth catmull-rom spline for drawing
function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t*t, t3 = t*t*t;
  return {
    x: 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

function computeSpline(trackPoints) {
  const pts = [];
  const n = trackPoints.length;
  for (let i = 0; i < n; i++) {
    const p0 = trackPoints[(i-1+n)%n], p1 = trackPoints[i];
    const p2 = trackPoints[(i+1)%n],   p3 = trackPoints[(i+2)%n];
    for (let s = 0; s < 12; s++) pts.push(catmullRom(p0,p1,p2,p3,s/12));
  }
  return pts;
}

function buildTrackPaths(pts) {
  const n = pts.length;
  const outer = [], inner = [];
  for (let i = 0; i < n; i++) {
    const a = pts[i], b = pts[(i+1)%n];
    const dx = b.x-a.x, dy = b.y-a.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = -dy/len, ny = dx/len;
    outer.push({x:a.x+nx*TRACK_WIDTH/2, y:a.y+ny*TRACK_WIDTH/2});
    inner.push({x:a.x-nx*TRACK_WIDTH/2, y:a.y-ny*TRACK_WIDTH/2});
  }
  return {outer, inner};
}

function buildBushes(pts, scrolling) {
  const list = [];
  const rand = seededRand(42);
  const n = pts.length;
  // Larger world bounds + more decorations for scrolling maps
  const xMin = scrolling ? -600 : 20,  xMax = scrolling ? 5000 : 880;
  const yMin = scrolling ? -300 : 20,  yMax = scrolling ? 1200 : 630;
  const count1 = scrolling ? 88 : 22;
  const count2 = scrolling ? 72 : 18;
  const outerOffsets = [110,130,155];
  for (let k = 0; k < count1; k++) {
    const i = Math.floor(rand()*n);
    const a = pts[i], b = pts[(i+1)%n];
    const dx = b.x-a.x, dy = b.y-a.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = -dy/len, ny = dx/len;
    const off = outerOffsets[Math.floor(rand()*outerOffsets.length)];
    const bx = a.x+nx*off+(rand()-0.5)*20, by = a.y+ny*off+(rand()-0.5)*20;
    if (bx>xMin&&bx<xMax&&by>yMin&&by<yMax) list.push({x:bx,y:by,r:10+rand()*10,shade:rand()});
  }
  const innerOffsets = [90,110,140];
  for (let k = 0; k < count2; k++) {
    const i = Math.floor(rand()*n);
    const a = pts[i], b = pts[(i+1)%n];
    const dx = b.x-a.x, dy = b.y-a.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = -dy/len, ny = dx/len;
    const off = innerOffsets[Math.floor(rand()*innerOffsets.length)];
    const bx = a.x-nx*off+(rand()-0.5)*20, by = a.y-ny*off+(rand()-0.5)*20;
    if (bx>xMin&&bx<xMax&&by>yMin&&by<yMax) list.push({x:bx,y:by,r:9+rand()*9,shade:rand()});
  }
  return list;
}

function buildObstacles(placements, pts, n) {
  return placements.map(([frac, latFrac]) => {
    const i = Math.floor(frac * n);
    const a = pts[i], b = pts[(i+1)%n];
    const dx = b.x-a.x, dy = b.y-a.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = -dy/len, ny = dx/len;
    const off = latFrac*(TRACK_WIDTH/2-10);
    return { x:a.x+nx*off, y:a.y+ny*off, r:(7+Math.abs(latFrac)*4)*0.7, angle:Math.atan2(dy,dx) };
  });
}

  trackPoints        = map.trackPoints;
  obstaclePlacements = map.obstaclePlacements;

  splinePts = computeSpline(trackPoints);
  ({outer: outerPts, inner: innerPts} = buildTrackPaths(splinePts));
  NSPLINE = splinePts.length;

  sfPt = splinePts[0];
  const sfPt2 = splinePts[1];
  sfDx = sfPt2.x - sfPt.x; sfDy = sfPt2.y - sfPt.y;
  sfLen = Math.sqrt(sfDx*sfDx + sfDy*sfDy);
  sfNx = -sfDy / sfLen; sfNy = sfDx / sfLen;

  finishA = {x: sfPt.x + sfNx*(TRACK_WIDTH/2), y: sfPt.y + sfNy*(TRACK_WIDTH/2)};
  finishB = {x: sfPt.x - sfNx*(TRACK_WIDTH/2), y: sfPt.y - sfNy*(TRACK_WIDTH/2)};

  checkpoints = [0.25, 0.5, 0.75, 0.875].map(frac => {
    const i = Math.floor(frac * NSPLINE);
    const a = splinePts[i], b = splinePts[(i+1) % NSPLINE];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = -dy/len, ny = dx/len;
    return {ax: a.x+nx*(TRACK_WIDTH/2+18), ay: a.y+ny*(TRACK_WIDTH/2+18),
            bx: a.x-nx*(TRACK_WIDTH/2+18), by: a.y-ny*(TRACK_WIDTH/2+18), hit: false};
  });

  obstacles = buildObstacles(obstaclePlacements, splinePts, NSPLINE);
  bushes    = buildBushes(splinePts, !!MAPS[index].scrolling);
  camX = 0; camY = 0;

  // Apply per-map car physics (fall back to defaults)
  const cfg = MAPS[index].carConfig || DEFAULT_CAR;
  MAX_SPEED    = cfg.MAX_SPEED;
  SPEED_PHASE1 = cfg.SPEED_PHASE1;
  OFFTRACK_MAX = cfg.OFFTRACK_MAX;
  ACCEL        = cfg.ACCEL;
  BRAKE        = cfg.BRAKE;
  FRICTION     = cfg.FRICTION;
  STEER_SPEED  = cfg.STEER_SPEED;
}

loadMap(0);

// Returns true if (px,py) is within TRACK_WIDTH/2 of the spline centre line
function pointOnTrack(px, py) {
  const half = TRACK_WIDTH / 2;
  const halfSq = half * half;
  for (let i = 0; i < NSPLINE; i++) {
    const a = splinePts[i], b = splinePts[(i+1) % NSPLINE];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx*dx + dy*dy;
    let t = len2 > 0 ? ((px - a.x)*dx + (py - a.y)*dy) / len2 : 0;
    t = Math.max(0, Math.min(1, t));
    const cx = a.x + t*dx, cy = a.y + t*dy;
    const ddx = px - cx, ddy = py - cy;
    if (ddx*ddx + ddy*ddy <= halfSq) return true;
  }
  return false;
}

// Segment intersection: returns crossing direction (+1 forward, -1 back) or null
function segCross(p1x, p1y, p2x, p2y, p3x, p3y, p4x, p4y) {
  const d1x = p2x-p1x, d1y = p2y-p1y;
  const d2x = p4x-p3x, d2y = p4y-p3y;
  const denom = d1x*d2y - d1y*d2x;
  if (Math.abs(denom) < 1e-10) return null;
  const dx = p3x-p1x, dy = p3y-p1y;
  const t = (dx*d2y - dy*d2x) / denom;
  const u = (dx*d1y - dy*d1x) / denom;
  if (t > 0 && t <= 1 && u >= 0 && u <= 1) return Math.sign(denom);
  return null;
}

// Car
const car = {
  x: sfPt.x + sfNx*5,
  y: sfPt.y + sfNy*5,
  prevX: sfPt.x + sfNx*5,
  prevY: sfPt.y + sfNy*5,
  angle: Math.atan2(sfDy, sfDx),
  vx: 0,
  vy: 0,
  onTrack: true,
  lapStartTime: null,
  laps: 0,
  bestLap: null,
  worstLap: null,
  raceStartTime: null,
  raceStarted: false,
  finished: false,
  totalLaps: 5,
  steerAmount: 0
};

function resetGame() {
  car.x = sfPt.x + sfNx*5;
  car.y = sfPt.y + sfNy*5;
  car.prevX = car.x; car.prevY = car.y;
  car.angle = Math.atan2(sfDy, sfDx);
  car.vx = 0; car.vy = 0;
  car.laps = 0;
  car.bestLap = null;
  car.worstLap = null;
  car.lapStartTime = null;
  car.raceStartTime = null;

function checkLapCross() {
  const px = car.prevX, py = car.prevY;
  const cx = car.x, cy = car.y;

  // Check checkpoints first
  for (const cp of checkpoints) {
    if (!cp.hit) {
      const hit = segCross(px, py, cx, cy, cp.ax, cp.ay, cp.bx, cp.by);
      if (hit !== null) cp.hit = true;
    }
  }

  // Check finish line — forward crossing is when movement has positive component along sfDx,sfDy
  const dir = segCross(px, py, cx, cy, finishA.x, finishA.y, finishB.x, finishB.y);
  if (dir !== null) {
    const moveDot = (cx - px) * sfDx + (cy - py) * sfDy;
    const forward = moveDot > 0;
    if (forward && car.raceStarted) {
      const allHit = checkpoints.every(c => c.hit);
      if (allHit) {
        const now = performance.now();
        const lapTime = (now - car.lapStartTime) / 1000;
        if (!car.bestLap  || lapTime < car.bestLap)  car.bestLap  = lapTime;
        if (!car.worstLap || lapTime > car.worstLap) car.worstLap = lapTime;
        car.laps++;
        car.lapStartTime = now;
        if (car.laps >= car.totalLaps) {
          const totalTime = (now - car.raceStartTime) / 1000;
          const avg = totalTime / car.totalLaps;
          showWinner('WINNER!!', true, { best: car.bestLap, worst: car.worstLap, avg });
          if (roomCode) set(ref(db, `rooms/${roomCode}/winner`), myPlayerId);
        }
      }
      checkpoints.forEach(c => c.hit = false);
    }
  }
}

function update() {
  if (car.finished || paused) return;

  const up = keys['ArrowUp'] || keys['w'] || keys['W'];
  const down = keys['ArrowDown'] || keys['s'] || keys['S'];
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];

  // Start timer on first keypress
  if (!car.raceStarted && (up || down || left || right)) {
    car.raceStarted = true;
    car.lapStartTime = performance.now();
    car.raceStartTime = car.lapStartTime;
  }

  const hx = Math.cos(car.angle), hy = Math.sin(car.angle);

  // Accelerate / brake along heading direction
  // Above 105 km/h the acceleration rate drops to 55% (45% slower)
  if (up) {
    const spd = Math.sqrt(car.vx*car.vx + car.vy*car.vy);
    const accelMult = spd > SPEED_PHASE1 ? 0.55 : 1.0;
    car.vx += hx * ACCEL * accelMult;
    car.vy += hy * ACCEL * accelMult;
  }
  if (down) { car.vx -= hx * BRAKE; car.vy -= hy * BRAKE; }

  car.onTrack = pointOnTrack(car.x, car.y);
  const maxSpd = car.onTrack ? MAX_SPEED : OFFTRACK_MAX;

  // Longitudinal speed computed AFTER acceleration so grip doesn't fight it
  const longSpd = car.vx * hx + car.vy * hy;

  // Cap total speed (lower cap in reverse)
  const totalSpd = Math.sqrt(car.vx*car.vx + car.vy*car.vy);
  const effectiveMax = longSpd >= 0 ? maxSpd : maxSpd * 0.5;
  if (totalSpd > effectiveMax) { car.vx *= effectiveMax/totalSpd; car.vy *= effectiveMax/totalSpd; }

  // Ramp steerAmount up while turning, down when released
  if (left || right) {
    car.steerAmount = Math.min(0.7, car.steerAmount + 0.06);
  } else {
    car.steerAmount = Math.max(0, car.steerAmount - 0.04);
  }

  // Lateral grip: fraction of lateral velocity removed per frame
  // High = snappy/grippy, low = drifty (lateral velocity persists)
  // Dirt road has less base grip; hard cornering drops it much further
  const baseGrip = car.onTrack ? (currentMapIndex === 3 ? 0.38 : 0.58) : 0.42;
  const grip = Math.max(0.07, baseGrip - car.steerAmount * 0.85);
  const latVx = car.vx - longSpd * hx;
  const latVy = car.vy - longSpd * hy;
  car.vx -= latVx * grip;
  car.vy -= latVy * grip;

  // Overall friction — dragster sheds extra speed while turning
  let friction = car.onTrack ? FRICTION : 0.94;
  if (currentMapIndex === 3) friction *= (1 - car.steerAmount * 0.06);
  car.vx *= friction;
  car.vy *= friction;

  // Steering (based on longitudinal speed so reversing steers correctly)
  if (Math.abs(longSpd) > 0.05) {
    let steerAmt;
    if (currentMapIndex === 3) {
      // Dragster: full regular-car turning below 80 km/h (2.0),
      // then turn radius grows rapidly — at max speed steering is very sluggish.
      const spd = Math.abs(longSpd);
      const SPD_LOW  = 2.0;                            // 80 km/h — full turning below this
      const SPD_HIGH = MAX_SPEED;                      // 260 km/h
      const STEER_LOW  = 0.055 * (SPD_LOW / 3.25);    // regular car rate at 80 km/h ≈ 0.034
      const STEER_HIGH = 0.010;                        // very wide radius at max speed
      let rate;
      if (spd <= SPD_LOW) {
        rate = 0.055 * (spd / 3.25);                  // identical to regular car below 80
      } else {
        // Quadratic curve so radius grows faster as speed climbs
        const t = Math.min(1, (spd - SPD_LOW) / (SPD_HIGH - SPD_LOW));
        rate = STEER_LOW + (STEER_HIGH - STEER_LOW) * (t * t);
      }
      steerAmt = Math.sign(longSpd) * rate;
    } else {
      steerAmt = STEER_SPEED * (longSpd / MAX_SPEED);
    }
    if (left)  car.angle -= steerAmt;
    if (right) car.angle += steerAmt;
  }

  car.prevX = car.x;
  car.prevY = car.y;
  car.x += car.vx;
  car.y += car.vy;

  // Boundary clamp — use large world bounds for scrolling maps, canvas bounds otherwise
  if (MAPS[currentMapIndex].scrolling) {
    car.x = Math.max(-500, Math.min(3500, car.x));
    car.y = Math.max(-300, Math.min(1000, car.y));
  } else {
    car.x = Math.max(5, Math.min(W-5, car.x));
    car.y = Math.max(5, Math.min(H-5, car.y));
  }

  checkLapCross();
  checkObstacleCollisions();
  spawnParticles();
}

// Deterministic window-lit hash (no flicker)
function winLit(bx, by, wx, wy) {
  const n = Math.sin(bx * 12.7 + by * 31.1 + wx * 5.3 + wy * 17.9) * 43758.5453;
  return (n - Math.floor(n)) > 0.38;
}

function drawCityBackground() {
  // Pavement base
  ctx.fillStyle = '#1c1c1c';
  ctx.fillRect(0, 0, W, H);

  // Sidewalk grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 60) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for (let gy = 0; gy < H; gy += 60) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

  // Building blocks — placed in interior and exterior of the City Block track
  const buildings = [
    // Interior: top strip
    {x:162, y:158, w:566, h:72},
    // Interior: bottom strip
    {x:162, y:452, w:566, h:68},
    // Interior: central superblock
    {x:300, y:268, w:288, h:112},
    // Interior: left bay (between left peninsula roads)
    {x:158, y:268, w:112, h:112},
    // Interior: right bay (between right peninsula roads)
    {x:668, y:268, w:82, h:112},
    // Exterior: top-left corner
    {x:0,   y:0,   w:148, h:92},
    // Exterior: top strip
    {x:172, y:0,   w:488, h:68},
    // Exterior: top-right corner
    {x:762, y:0,   w:138, h:92},
    // Exterior: bottom-left corner
    {x:0,   y:562, w:148, h:88},
    // Exterior: bottom strip
    {x:172, y:604, w:488, h:46},
    // Exterior: bottom-right corner
    {x:762, y:562, w:138, h:88},
    // Exterior: left side top
    {x:0,   y:102, w:56,  h:152},
    // Exterior: left side bottom
    {x:0,   y:422, w:56,  h:132},
    // Exterior: right side top
    {x:848, y:102, w:52,  h:152},
    // Exterior: right side bottom
    {x:848, y:422, w:52,  h:132},
  ];

  for (const b of buildings) {
    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(b.x+5, b.y+5, b.w, b.h);

    // Building body — varied shade per building
    const shade = 26 + ((b.x * 7 + b.y * 13) % 18);
    ctx.fillStyle = `rgb(${shade},${shade},${shade+2})`;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // Rooftop edge highlight
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(b.x, b.y, b.w, 3);
    ctx.fillRect(b.x, b.y, 3, b.h);

    // Windows (lit = warm yellow, unlit = dark)
    const ww = 7, wh = 6, gapX = 6, gapY = 5;
    for (let wx = b.x + 9; wx + ww <= b.x + b.w - 6; wx += ww + gapX) {
      for (let wy = b.y + 9; wh <= b.y + b.h - wy - 6; wy += wh + gapY) {
        if (winLit(b.x, b.y, wx, wy)) {
          ctx.fillStyle = 'rgba(255,220,120,0.55)';
        } else {
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
        }
        ctx.fillRect(wx, wy, ww, wh);
      }
    }
  }
}

function drawDesertBackground() {
  // Sandy base — covers entire visible world area
  ctx.fillStyle = '#D4B080';
  ctx.fillRect(camX - 10, camY - 10, W + 20, H + 20);

  // Sand ripple lines (subtle horizontal waves, world-anchored so they scroll)
  ctx.strokeStyle = 'rgba(180,135,60,0.28)';
  ctx.lineWidth = 1;
  ctx.setLineDash([50, 18]);
  const startY = Math.floor(camY / 24) * 24;
  for (let gy = startY; gy < camY + H + 24; gy += 24) {
    ctx.beginPath();
    ctx.moveTo(camX, gy);
    ctx.lineTo(camX + W, gy);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Sparse sand dune shading blobs (deterministic, world-anchored)
  const cellSize = 120;
  const startCX = Math.floor(camX / cellSize) - 1;
  const startCY = Math.floor(camY / cellSize) - 1;
  for (let cx = startCX; cx < startCX + W / cellSize + 2; cx++) {
    for (let cy = startCY; cy < startCY + H / cellSize + 2; cy++) {
      const h = Math.sin(cx * 31.7 + cy * 17.3) * 43758.5453;
      const r = h - Math.floor(h);
      if (r > 0.72) {
        const wx = cx * cellSize + (r * 80 - 40);
        const wy = cy * cellSize + (Math.sin(cx * 7 + cy * 13) * 0.5 + 0.5) * cellSize;
        const rad = 18 + r * 30;
        ctx.fillStyle = `rgba(195,155,75,${0.12 + r * 0.1})`;
        ctx.beginPath();
        ctx.ellipse(wx, wy, rad * 2.5, rad * 0.7, 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawTrack() {
  const isCity   = currentMapIndex === 2;
  const isDesert = currentMapIndex === 3;

  // --- ENTITY 1: Ground ---
  if (isCity) {
    drawCityBackground();
  } else if (isDesert) {
    drawDesertBackground();
  } else {
    ctx.fillStyle = '#3a7d44';
    ctx.fillRect(0, 0, W, H);
  }

  // --- ENTITY 2: Track road surface ---
  ctx.beginPath();
  ctx.moveTo(innerPts[0].x, innerPts[0].y);
  for (const p of innerPts) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.moveTo(outerPts[0].x, outerPts[0].y);
  for (const p of outerPts) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.fillStyle = isCity ? '#444' : isDesert ? '#B87B38' : '#C49A5A';
  ctx.fill('evenodd');

  const sn = splinePts.length;
  if (isCity) {
    // Asphalt texture: subtle concrete speckle strips
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 22]);
    for (let i = 0; i < sn; i++) {
      const a = splinePts[i], b = splinePts[(i+1)%sn];
      const ddx = b.x-a.x, ddy = b.y-a.y;
      const dl = Math.sqrt(ddx*ddx+ddy*ddy)||1;
      const dnx = -ddy/dl, dny = ddx/dl;
      for (const off of [-18, -6, 6, 18]) {
        ctx.beginPath();
        ctx.moveTo(a.x+dnx*off, a.y+dny*off);
        ctx.lineTo(b.x+dnx*off, b.y+dny*off);
        ctx.stroke();
      }
    }
    ctx.setLineDash([]);
  } else {
    // Dirt texture streaks
    ctx.strokeStyle = 'rgba(100,60,20,0.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 18]);
    for (let i = 0; i < sn; i++) {
      const a = splinePts[i], b = splinePts[(i+1)%sn];
      const ddx = b.x-a.x, ddy = b.y-a.y;
      const dl = Math.sqrt(ddx*ddx+ddy*ddy)||1;
      const dnx = -ddy/dl, dny = ddx/dl;
      for (const off of [-16, 16]) {
        ctx.beginPath();
        ctx.moveTo(a.x+dnx*off, a.y+dny*off);
        ctx.lineTo(b.x+dnx*off, b.y+dny*off);
        ctx.stroke();
      }
    }
    ctx.setLineDash([]);
  }

  // Track edge markers
  if (isCity) {
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
  } else if (isDesert) {
    ctx.strokeStyle = '#e07820';
    ctx.lineWidth = 3;
    ctx.setLineDash([18, 12]);
  } else {
    ctx.strokeStyle = '#5a3010';
    ctx.lineWidth = 3;
    ctx.setLineDash([20, 15]);
  }
  ctx.beginPath();
  ctx.moveTo(innerPts[0].x, innerPts[0].y);
  for (const p of innerPts) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(outerPts[0].x, outerPts[0].y);
  for (const p of outerPts) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);

  // Center dashed line
  ctx.strokeStyle = isCity ? 'rgba(255,220,0,0.7)' : isDesert ? 'rgba(255,255,255,0.55)' : 'rgba(200,150,80,0.45)';
  ctx.lineWidth = 2;
  ctx.setLineDash([15, 20]);
  ctx.beginPath();
  ctx.moveTo(splinePts[0].x, splinePts[0].y);
  for (const p of splinePts) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);

  // Start/finish line
  const lx1 = sfPt.x + sfNx*(TRACK_WIDTH/2);
  const ly1 = sfPt.y + sfNy*(TRACK_WIDTH/2);
  const lx2 = sfPt.x - sfNx*(TRACK_WIDTH/2);
  const ly2 = sfPt.y - sfNy*(TRACK_WIDTH/2);

  ctx.save();
  ctx.translate(lx1, ly1);
  const ang = Math.atan2(ly2-ly1, lx2-lx1);
  ctx.rotate(ang);
  const sqSize = 8;
  const lineLen = TRACK_WIDTH;
  const cols = Math.ceil(lineLen / sqSize);
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < 2; j++) {
      ctx.fillStyle = (i+j)%2===0 ? '#fff' : '#000';
      ctx.fillRect(i*sqSize, j*sqSize, sqSize, sqSize);
    }
  }
  ctx.restore();
}


function drawBushes() {
  if (currentMapIndex === 2) return;
  for (const b of bushes) {
    if (currentMapIndex === 3) {
      // Desert: cacti (shade < 0.55) or rocks (shade >= 0.55)
      if (b.shade < 0.55) {
        // Cactus (top-down: green circle with spines)
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(b.x+2, b.y+3, b.r+1, b.r*0.7, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#3d6e2e';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#52943d';
        ctx.beginPath(); ctx.arc(b.x-b.r*0.25, b.y-b.r*0.25, b.r*0.55, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        for (let a = 0; a < Math.PI*2; a += Math.PI/4) {
          ctx.beginPath();
          ctx.arc(b.x+Math.cos(a)*b.r*0.85, b.y+Math.sin(a)*b.r*0.85, 0.9, 0, Math.PI*2);
          ctx.fill();
        }
      } else {
        // Rock
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(b.x+3, b.y+4, b.r+2, b.r*0.7, 0, 0, Math.PI*2);
        ctx.fill();
        const g = Math.floor(105 + b.shade * 45);
        ctx.fillStyle = `rgb(${g+18},${g+5},${g-10})`;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgb(${g+35},${g+20},${g+5})`;
        ctx.beginPath(); ctx.arc(b.x-b.r*0.25, b.y-b.r*0.28, b.r*0.58, 0, Math.PI*2); ctx.fill();
      }
      continue;
    }

    // Shadow
    ctx.beginPath();
    ctx.ellipse(b.x+3, b.y+4, b.r, b.r*0.65, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fill();

    // Main bush body
    const green = Math.floor(100 + b.shade * 55);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = `rgb(30,${green},25)`;
    ctx.fill();

    // Highlight lobe
    ctx.beginPath();
    ctx.arc(b.x - b.r*0.25, b.y - b.r*0.25, b.r*0.55, 0, Math.PI*2);
    ctx.fillStyle = `rgb(45,${green+25},38)`;
    ctx.fill();

    // Small top highlight
    ctx.beginPath();
    ctx.arc(b.x - b.r*0.3, b.y - b.r*0.35, b.r*0.28, 0, Math.PI*2);
    ctx.fillStyle = `rgba(80,${green+50},60,0.6)`;
    ctx.fill();
  }
}


function drawObstacles() {
  if (currentMapIndex === 2) {
    // City map: parked cars
    const CAR_COLORS = ['#c0392b','#2471a3','#7f8c8d','#d4ac0d','#1e8449','#7d3c98','#ca6f1e'];
    for (let idx = 0; idx < obstacles.length; idx++) {
      const o = obstacles[idx];
      const cw = o.r * 2.4;
      const ch = o.r * 4.2;
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.angle + Math.PI / 2);
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(3, 4, cw/2+3, ch/2+3, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = CAR_COLORS[idx % CAR_COLORS.length];
      ctx.beginPath();
      ctx.roundRect(-cw/2, -ch/2, cw, ch, 3);
      ctx.fill();
      ctx.fillStyle = 'rgba(150,220,255,0.75)';
      ctx.fillRect(-cw/2+2, -ch/2+3, cw-4, ch*0.27);
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(-cw/2+2, -ch/2+3+ch*0.27, cw-4, ch*0.32);
      ctx.fillStyle = 'rgba(150,220,255,0.55)';
      ctx.fillRect(-cw/2+2, ch/2-3-ch*0.16, cw-4, ch*0.14);
      ctx.fillStyle = '#111';
      const frontY = -ch/2 + ch*0.18;
      const rearY  =  ch/2 - ch*0.18;
      ctx.fillRect(-cw/2-3, frontY-4, 3.5, 7);
      ctx.fillRect( cw/2-0.5, frontY-4, 3.5, 7);
      ctx.fillRect(-cw/2-3, rearY-4,  3.5, 7);
      ctx.fillRect( cw/2-0.5, rearY-4,  3.5, 7);
      ctx.restore();
    }
  } else {
    // Classic / Oval Sprint: logs
    for (const o of obstacles) {
      const logR = o.r;
      const logHalfLen = logR * 2.8;
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.angle + Math.PI / 2);
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(3, 5, logHalfLen + 2, logR + 1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6B3E1E';
      ctx.beginPath();
      ctx.roundRect(-logHalfLen, -logR, logHalfLen * 2, logR * 2, logR);
      ctx.fill();
      ctx.fillStyle = '#8B5A2B';
      ctx.beginPath();
      ctx.roundRect(-logHalfLen + 2, -logR + 2, logHalfLen * 2 - 4, logR * 2 - 4, logR - 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(40,18,5,0.30)';
      ctx.lineWidth = 1;
      for (let g = -logHalfLen + logR + 4; g < logHalfLen - logR - 2; g += 5) {
        ctx.beginPath(); ctx.moveTo(g, -logR + 3); ctx.lineTo(g, logR - 3); ctx.stroke();
      }
      for (const ex of [-logHalfLen + logR, logHalfLen - logR]) {
        ctx.beginPath(); ctx.arc(ex, 0, logR - 1, 0, Math.PI * 2);
        ctx.fillStyle = '#3D1F08'; ctx.fill();
        ctx.beginPath(); ctx.arc(ex, 0, logR * 0.65, 0, Math.PI * 2);
        ctx.fillStyle = '#6B3E1E'; ctx.fill();
        ctx.beginPath(); ctx.arc(ex, 0, logR * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = '#3D1F08'; ctx.fill();
      }
      ctx.restore();
    }
  }
}

function checkObstacleCollisions() {
  const carR = 8;
  for (const o of obstacles) {
    if (currentMapIndex === 2) {
      // OBB collision: rectangle hitbox matching the drawn car model
      const hw = o.r * 1.2;  // half car width  (cw/2 = o.r*2.4/2)
      const hh = o.r * 2.1;  // half car length (ch/2 = o.r*4.2/2)
      const angle = o.angle + Math.PI / 2;
      const cosA = Math.cos(angle), sinA = Math.sin(angle);

      const dx = car.x - o.x, dy = car.y - o.y;
      // Rotate car position into obstacle's local space
      const lx =  dx * cosA + dy * sinA;
      const ly = -dx * sinA + dy * cosA;

      // Closest point on rectangle to circle centre
      const clampX = Math.max(-hw, Math.min(hw, lx));
      const clampY = Math.max(-hh, Math.min(hh, ly));
      const distX = lx - clampX, distY = ly - clampY;
      const dist = Math.sqrt(distX * distX + distY * distY);

      if (dist < carR) {
        let pushX, pushY;
        if (dist > 0.001) {
          pushX = distX / dist;
          pushY = distY / dist;
        } else {
          // Circle centre inside rect — push out along shortest-overlap axis
          const ox = hw - Math.abs(lx), oy = hh - Math.abs(ly);
          if (ox < oy) { pushX = lx > 0 ? 1 : -1; pushY = 0; }
          else         { pushX = 0; pushY = ly > 0 ? 1 : -1; }
        }
        const overlap = carR - dist;
        // Rotate push direction back to world space
        const wpx = pushX * cosA - pushY * sinA;
        const wpy = pushX * sinA + pushY * cosA;
        car.x += wpx * overlap;
        car.y += wpy * overlap;
        const dot = car.vx * wpx + car.vy * wpy;
        if (dot < 0) {
          car.vx -= dot * wpx * 1.4;
          car.vy -= dot * wpy * 1.4;
          car.vx *= 0.55;
          car.vy *= 0.55;
        }
      }
    } else {
      // Circle collision for logs
      const dx = car.x - o.x, dy = car.y - o.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = carR + o.r;
      if (dist < minDist && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        car.x += nx * overlap;
        car.y += ny * overlap;
        const dot = car.vx * nx + car.vy * ny;
        if (dot < 0) {
          car.vx -= dot * nx * 1.4;
          car.vy -= dot * ny * 1.4;
          car.vx *= 0.55;
          car.vy *= 0.55;
        }
      }
    }
  }
}

// --- Particle system ---
const particles = [];

function spawnParticles() {
  const totalSpd = Math.sqrt(car.vx*car.vx + car.vy*car.vy);
  if (totalSpd < 0.3) return;

  // Number of particles scales with speed
  const count = Math.floor(totalSpd * 1.8);
  const hx = Math.cos(car.angle), hy = Math.sin(car.angle);
  // Spawn from rear of car
  const rx = car.x - hx * 12, ry = car.y - hy * 12;

  for (let i = 0; i < count; i++) {
    const spread = (Math.random() - 0.5) * 8;
    const nx = -hy, ny = hx; // perpendicular
    particles.push({
      x: rx + nx * spread + (Math.random() - 0.5) * 3,
      y: ry + ny * spread + (Math.random() - 0.5) * 3,
      vx: -hx * (0.3 + Math.random() * 0.5) * totalSpd * 0.4 + (Math.random()-0.5) * 0.4,
      vy: -hy * (0.3 + Math.random() * 0.5) * totalSpd * 0.4 + (Math.random()-0.5) * 0.4,
      life: 1,
      decay: 0.06 + Math.random() * 0.06,
      size: 1 + Math.random() * 1.5,
      r: 130 + Math.floor(Math.random() * 50),
      g: 80 + Math.floor(Math.random() * 40),
      b: 30 + Math.floor(Math.random() * 30),
    });
  }
}

function updateAndDrawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.life * 0.85})`;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
}

function drawCar() {
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle - Math.PI / 2);

  if (currentMapIndex === 3) {
    // Drag car: long, narrow
    const cw = 10, ch = 34;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(3,3,cw/2+2,ch/2+2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = myColor;
    ctx.beginPath(); ctx.roundRect(-cw/2,-ch/2,cw,ch,3); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.moveTo(-cw/2+1,-ch/2); ctx.lineTo(cw/2-1,-ch/2); ctx.lineTo(0,-ch/2-4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(100,200,255,0.75)';
    ctx.fillRect(-cw/2+2,-ch/2+6,cw-4,7);
    ctx.fillStyle = '#111';
    ctx.fillRect(-cw/2-4,ch/2-5,cw+8,3); ctx.fillRect(-cw/2-3,ch/2-9,2,5); ctx.fillRect(cw/2+1,ch/2-9,2,5);
    ctx.fillStyle = '#222';
    ctx.fillRect(-cw/2-5,-ch/2+3,5,8); ctx.fillRect(cw/2,-ch/2+3,5,8);
    ctx.fillRect(-cw/2-6,ch/2-11,6,10); ctx.fillRect(cw/2,ch/2-11,6,10);
  } else {
    // Standard car
    const cw = 14, ch = 24;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(3,3,cw/2+2,ch/2+2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = myColor;
    ctx.beginPath(); ctx.roundRect(-cw/2,-ch/2,cw,ch,4); ctx.fill();
    ctx.fillStyle = 'rgba(150,220,255,0.7)';
    ctx.fillRect(-cw/2+3,-ch/2+4,cw-6,ch/2.5);
    ctx.fillStyle = 'rgba(150,220,255,0.5)';
    ctx.fillRect(-cw/2+3,ch/2-8,cw-6,5);
    ctx.fillStyle = '#222';
    ctx.fillRect(-cw/2-3,-ch/2+2,4,7); ctx.fillRect(cw/2-1,-ch/2+2,4,7);
    ctx.fillRect(-cw/2-3,ch/2-9,4,7);  ctx.fillRect(cw/2-1,ch/2-9,4,7);
  }

  // Own name tag — un-rotate so text stays upright
  ctx.rotate(-(car.angle - Math.PI/2));
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(playerName, 0, -20);

  ctx.restore();
}

function updateHUD(dt) {
  const spd = Math.sqrt(car.vx*car.vx + car.vy*car.vy) * 40;
  document.getElementById('speedVal').textContent = spd.toFixed(0);
  document.getElementById('lapDisplayVal').textContent = `${Math.min(car.laps, car.totalLaps)}/${car.totalLaps}`;

  if (car.raceStarted && !car.finished) {
    const elapsed = (performance.now() - car.lapStartTime) / 1000;
    document.getElementById('lapTimeVal').textContent = elapsed.toFixed(1)+'s';
  }
}

// ── MULTIPLAYER FUNCTIONS ──────────────────────────────────────────────────────

function showWinner(title, isYou, stats) {
  document.getElementById('winnerTitle').textContent = title;
  document.getElementById('winnerTitle').style.color = isYou ? '#fc0' : '#f55';
  document.getElementById('wsBest').textContent  = stats && stats.best  != null ? stats.best.toFixed(2)  + 's' : '—';
  document.getElementById('wsWorst').textContent = stats && stats.worst != null ? stats.worst.toFixed(2) + 's' : '—';
  document.getElementById('wsAvg').textContent   = stats && stats.avg   != null ? stats.avg.toFixed(2)  + 's' : '—';
  document.getElementById('winnerBanner').style.display = 'block';
  car.finished = true;
}

function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  document.getElementById('lobbyScreen').style.display = 'none';
  document.getElementById('gameWrapper').style.display = 'inline-block';
  showStartPrompt();
  requestAnimationFrame(loop);
}

async function joinRoom() {
  const playerRef = ref(db, `rooms/${roomCode}/players/${myPlayerId}`);
  await set(playerRef, { x:0, y:0, angle:0, laps:0, onTrack:true });
  onDisconnect(playerRef).remove();
  listenToRoom();
}

function listenToRoom() {
  onValue(ref(db, `rooms/${roomCode}`), snap => {
    const data = snap.val();
    if (!data) return;
    if (!isHost && data.mapIndex !== undefined && data.mapIndex !== currentMapIndex)
      switchMap(data.mapIndex);
    if (!isHost && data.laps !== undefined && data.laps !== car.totalLaps)
      setLaps(data.laps);
    if (data.started && !gameStarted) startGame();
    if (data.winner && !car.finished) {
      const stats = { best: car.bestLap, worst: car.worstLap,
                      avg: car.raceStarted ? (performance.now() - car.raceStartTime) / 1000 / Math.max(car.laps, 1) : null };
      if (data.winner === myPlayerId) {
        showWinner('WINNER!!', true, stats);
      } else {
        const winnerName = (data.players && data.players[data.winner] && data.players[data.winner].name) || data.winner.slice(0,4);
        showWinner(`${winnerName} WINS!`, false, stats);
      }
    }
    remotePlayers = {};
    for (const [id, p] of Object.entries(data.players || {})) {
      if (id !== myPlayerId) remotePlayers[id] = p;
    }
  });
}

document.getElementById('btnCreate').onclick = async () => {
  myPlayerId = Math.random().toString(36).slice(2,10);
  roomCode   = Math.random().toString(36).slice(2,8).toUpperCase();
  isHost     = true;
  await set(ref(db, `rooms/${roomCode}`), { mapIndex: currentMapIndex, laps: car.totalLaps, started: false, players: {} });
  await joinRoom();
  document.getElementById('lobbyStatus').textContent = `Room code: ${roomCode}  —  share this with friends!`;
  document.getElementById('btnStartRace').style.display = 'block';
};

document.getElementById('btnJoin').onclick = async () => {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (!code) { document.getElementById('lobbyStatus').textContent = 'Enter a room code first.'; return; }
  myPlayerId = Math.random().toString(36).slice(2,10);
  roomCode   = code;
  isHost     = false;
  document.getElementById('lobbyStatus').textContent = `Joining ${roomCode}...`;
  await joinRoom();
  document.getElementById('lobbyStatus').textContent = `Joined ${roomCode} — waiting for host to start...`;
};

document.getElementById('btnStartRace').onclick = () => {
  set(ref(db, `rooms/${roomCode}/started`), true);
};

document.getElementById('btnSolo').onclick = () => startGame();

function syncUsername(val) {
  playerName = val.trim() || 'Player';
  document.getElementById('usernameInput').value = val;
  document.getElementById('menuUsernameInput').value = val;
}
document.getElementById('usernameInput').addEventListener('input', e => syncUsername(e.target.value));
document.getElementById('menuUsernameInput').addEventListener('input', e => syncUsername(e.target.value));

function drawRemotePlayers() {
  for (const [id, p] of Object.entries(remotePlayers)) {
    const col = p.color || '#36f';
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle - Math.PI / 2);

    if (currentMapIndex === 3) {
      // Drag car design for Desert Oval
      const cw = 10, ch = 34;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath(); ctx.ellipse(3,3,cw/2+2,ch/2+2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.roundRect(-cw/2,-ch/2,cw,ch,3); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.moveTo(-cw/2+1,-ch/2); ctx.lineTo(cw/2-1,-ch/2); ctx.lineTo(0,-ch/2-4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(100,200,255,0.75)';
      ctx.fillRect(-cw/2+2,-ch/2+6,cw-4,7);
      ctx.fillStyle = '#111';
      ctx.fillRect(-cw/2-4,ch/2-5,cw+8,3); ctx.fillRect(-cw/2-3,ch/2-9,2,5); ctx.fillRect(cw/2+1,ch/2-9,2,5);
      ctx.fillStyle = '#222';
      ctx.fillRect(-cw/2-5,-ch/2+3,5,8); ctx.fillRect(cw/2,-ch/2+3,5,8);
      ctx.fillRect(-cw/2-6,ch/2-11,6,10); ctx.fillRect(cw/2,ch/2-11,6,10);
    } else {
      // Standard car
      const cw = 14, ch = 24;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(3,3,cw/2+2,ch/2+2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.roundRect(-cw/2,-ch/2,cw,ch,4); ctx.fill();
      ctx.fillStyle = 'rgba(150,220,255,0.7)';
      ctx.fillRect(-cw/2+3,-ch/2+4,cw-6,ch/2.5);
      ctx.fillStyle = 'rgba(150,220,255,0.5)';
      ctx.fillRect(-cw/2+3,ch/2-8,cw-6,5);
      ctx.fillStyle = '#222';
      ctx.fillRect(-cw/2-3,-ch/2+2,4,7); ctx.fillRect(cw/2-1,-ch/2+2,4,7);
      ctx.fillRect(-cw/2-3,ch/2-9,4,7);  ctx.fillRect(cw/2-1,ch/2-9,4,7);
    }

    // Name tag — un-rotate so text stays upright
    ctx.rotate(-(p.angle - Math.PI/2));
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.name || id.slice(0,4), 0, -20);
    ctx.restore();
  }
}

let last = 0;

function loop(ts) {
  const dt = ts - last; last = ts;
  update();

  // Sync local car to Firebase at 20Hz
  if (roomCode && ts - lastSync > 50) {
    lastSync = ts;
    set(ref(db, `rooms/${roomCode}/players/${myPlayerId}`), {
      x: Math.round(car.x), y: Math.round(car.y),
      angle: +car.angle.toFixed(3),
      laps: car.laps, onTrack: car.onTrack, name: playerName, color: myColor,
    });
  }

  const scrolling = !!MAPS[currentMapIndex].scrolling;
  if (scrolling) { camX = car.x - W/2; camY = car.y - H/2; }

  ctx.clearRect(0, 0, W, H);

  if (scrolling) { ctx.save(); ctx.translate(-Math.round(camX), -Math.round(camY)); }
  drawTrack();
  drawBushes();
  drawObstacles();
  updateAndDrawParticles();
  drawRemotePlayers();
  drawCar();
  if (scrolling) ctx.restore();

  // Off-track indicator (screen space — after restore)
  if (!car.onTrack) {
    ctx.fillStyle = 'rgba(255,80,0,0.12)';
    ctx.fillRect(0, 0, W, H);
  }

  updateHUD(dt);
  requestAnimationFrame(loop);
}

// Start prompt (shown once game starts)
function showStartPrompt() {
  const msg = document.getElementById('msg');
  msg.innerHTML = 'Press Arrow Keys / WASD<br><span style="font-size:18px">Drive through Start/Finish to begin!</span>';
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; }, 3000);
}

// Expose to global scope for inline HTML onclick attributes (required for type="module")
window.switchMap = switchMap;
